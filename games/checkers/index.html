<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Game Centre - Checkers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg: #0f0f12;
      --card-bg: #17171c;
      --light-cell: #2a2d33;
      --dark-cell:  #1f2228;
      --accent-red: #ff5a52;
      --accent-white: #e9eef4;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.7);
      --shadow: rgba(0,0,0,0.6);
      --edge: rgba(255,255,255,0.12);
      --gold: #ffd700;

      --board-vignette: radial-gradient(140% 90% at 50% 50%, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0.0) 60%, rgba(0,0,0,0.35) 100%);
      --board-weave: 
        linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%) 0 0/12px 12px,
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.03) 75%) 0 0/12px 12px,
        linear-gradient(-45deg, rgba(255,255,255,0.02) 25%, transparent 25%) 0 0/12px 12px,
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.02) 75%) 0 0/12px 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body{
      background: radial-gradient(1200px 600px at 30% -10%, #1b1730 0%, #0f0f12 60%) fixed;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 20px 60px;
      gap: 20px;
    }

    .card{
      background: color-mix(in srgb, var(--card-bg) 92%, #000 8%);
      border-radius: 14px;
      box-shadow: 0 14px 40px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
      width: fit-content;
      min-width: 480px;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    .card-header, .card-footer{
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.00));
    }
    .card-header{ border-bottom: 1px solid rgba(255,255,255,0.12); }
    .card-footer{ border-top: 1px solid rgba(255,255,255,0.12); }
    .card-body{
      padding: 18px 22px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .info-label{ font-size: 14px; color: var(--text); opacity: 0.95; }
    .muted{ color: var(--muted); }
    .player-label{
      font-size: 16px;
      letter-spacing: 0.2px;
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(0,0,0,0.6);
    }

    /* Waiting overlay */
    .waiting{
      display: none;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
      opacity: .9;
    }
    .spinner{
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: rgba(255,255,255,0.9);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Board frame & texture */
    .board-wrap{
      position: relative;
      padding: 14px;
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        radial-gradient(120% 140% at 50% -20%, rgba(255,255,255,0.08), rgba(255,255,255,0) 60%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(255,255,255,0.03),
        0 18px 40px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.14);
    }

    /* POV flip */
    .flip #board { transform: rotate(180deg); }
    .flip .piece { transform: rotate(180deg); }

    #board{
      position: relative;
      display: grid;
      grid-template: repeat(8, 64px) / repeat(8, 64px);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.06),
        0 20px 40px rgba(0,0,0,0.35);
      background-image: var(--board-weave), var(--board-vignette);
      background-blend-mode: overlay, normal;
      transition: transform .3s ease;
    }

    /* Cells + ambient tile sheen */
    .cell{
      width: 64px; height: 64px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      z-index: 0;
    }
    .light{
      background:
        linear-gradient(160deg, rgba(255,255,255,0.04), rgba(0,0,0,0.12)),
        linear-gradient(0deg, rgba(255,255,255,0.04), rgba(255,255,255,0.00));
      background-color: var(--light-cell);
    }
    .dark{
      background:
        linear-gradient(160deg, rgba(0,0,0,0.25), rgba(255,255,255,0.02)),
        linear-gradient(0deg, rgba(255,255,255,0.02), rgba(0,0,0,0.00));
      background-color: var(--dark-cell);
    }

    .dark::before{
      content: "";
      position: absolute;
      top: -50%; left: -60%;
      width: 220%; height: 200%;
      background: linear-gradient(100deg,
        transparent 25%,
        rgba(255,255,255,0.12) 50%,
        transparent 75%);
      transform: translateX(-160%) rotate(10deg);
      animation: tile-sheen 12s linear infinite;
      animation-delay: var(--delay, 0s);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 0;
      border-radius: 20%;
    }
    @keyframes tile-sheen{
      0%   { transform: translateX(-160%) rotate(10deg); }
      100% { transform: translateX(160%)  rotate(10deg); }
    }

    /* Glassy pieces + sheens */
    .piece{
      width: 54px; height: 54px; margin: 5px auto;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      isolation: isolate;
      z-index: 1;
      box-shadow:
        0 10px 18px rgba(0,0,0,0.55),
        0 0 0 1px var(--edge),
        inset 0 0 10px rgba(255,255,255,0.18),
        inset 0 -10px 18px rgba(0,0,0,0.35);
    }
    .piece::before{
      content:"";
      position:absolute;
      top: -40%; left: -50%;
      width: 200%; height: 180%;
      border-radius:50%;
      background: linear-gradient(100deg,
        transparent 20%,
        rgba(255,255,255,0.22) 50%,
        transparent 80%);
      transform: translateX(-160%) rotate(10deg);
      animation: sheen-slow 10s linear infinite;
      mix-blend-mode: screen;
      pointer-events:none;
      z-index: 1;
    }
    @keyframes sheen-slow{
      0%   { transform: translateX(-160%) rotate(10deg); }
      100% { transform: translateX(160%)  rotate(10deg); }
    }
    .piece.mine::after{
      content:"";
      position:absolute;
      top: -40%; left: -50%;
      width: 200%; height: 180%;
      border-radius:50%;
      background: linear-gradient(100deg,
        transparent 20%,
        rgba(255,215,0,0.65) 50%,
        transparent 80%);
      transform: translateX(-160%) rotate(10deg);
      opacity: 0;
      mix-blend-mode: screen;
      pointer-events:none;
      z-index: 2;
    }
    .piece.mine:hover::after{
      animation: sheen-fast 2.2s linear infinite;
      opacity: 1;
    }
    @keyframes sheen-fast{
      0%   { transform: translateX(-160%) rotate(10deg); }
      100% { transform: translateX(160%)  rotate(10deg); }
    }

    .p1{
      background-color: color-mix(in srgb, var(--accent-red) 70%, #ffffff 30%);
      box-shadow:
        0 10px 18px rgba(0,0,0,0.55),
        0 0 0 1px rgba(255,90,82,0.45),
        0 0 28px rgba(255,90,82,0.25),
        inset 0 0 10px rgba(255,160,150,0.25),
        inset 0 -10px 18px rgba(120,0,0,0.5);
    }
    .p2{
      background-color: color-mix(in srgb, var(--accent-white) 70%, #c6d6ff 30%);
      box-shadow:
        0 10px 18px rgba(0,0,0,0.55),
        0 0 0 1px rgba(230,238,244,0.40),
        0 0 26px rgba(190,220,255,0.22),
        inset 0 0 10px rgba(255,255,255,0.33),
        inset 0 -10px 18px rgba(0,20,60,0.35);
    }

    /* End-of-match overlay */
    .overlay{
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.65);
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      z-index: 5;
    }
    .overlay .panel{
      background: color-mix(in srgb, #1a1a1f 85%, #000 15%);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px 22px;
      min-width: 320px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      text-align: center;
    }
    .overlay .title{
      font-size: 28px; font-weight: 900; letter-spacing: .3px;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(255,215,0,.35);
    }
    .overlay .subtitle{ opacity: .9; margin-bottom: 18px; }
    .cta-row{ display: flex; gap: 10px; justify-content: center; }
    .cta-row button{
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 10px;
      color: var(--text);
      padding: 10px 16px;
      font-weight: 800;
      letter-spacing: .2px;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .cta-row button:hover{ transform: translateY(-1px); }

    /* Controls */
    #controls{
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    button{
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 16px;
      font-weight: 700;
      letter-spacing: .2px;
      cursor: pointer;
      transition: transform .08s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    button:hover{
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.06));
      box-shadow: 0 12px 28px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.18);
    }
    button:active{ transform: translateY(0); }

    /* Force UI text to white for crisp contrast */
    .card, .card * { color: var(--text); }
  </style>
</head>
<body>

  <div class="card" id="card">
    <div class="card-body">
      <div class="waiting" id="waiting">
        <div class="spinner"></div>
        <div class="info-label">Waiting for Opponent…</div>
      </div>

      <div class="player-label" id="top-label">…</div>

      <div class="board-wrap" id="board-wrap">
        <div id="board" aria-label="Checkers board" role="grid"></div>
      </div>

      <div class="player-label" id="bottom-label">…</div>

      <div id="controls">
        <button id="start-over" title="Reset the board to the initial position">Start Over</button>
        <button id="resign" title="Concede the game">Resign</button>
      </div>
    </div>

    <div id="turn-status-bar" style="padding:6px 16px;font-size:12px;color:rgba(255,255,255,0.6);text-align:right;">
      <span id="turn-status">Waiting for Opponent</span>
    </div>

    <!-- End-of-match overlay -->
    <div class="overlay" id="overlay">
      <div class="panel">
        <div class="title" id="overlay-title">You’ve Won!</div>
        <div class="subtitle" id="overlay-sub">Play again, gorgeous?</div>
        <div class="cta-row">
          <button id="play-again">Play Again</button>
          <button id="leave">Leave</button>
        </div>
      </div>
    </div>
  </div>

 <script src="game.js"></script>
</body>
</html>
